version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: tagger
      POSTGRES_PASSWORD: tagger_pass
      POSTGRES_DB: image_tagger_v3
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tagger-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tagger -d image_tagger_v3"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.backend
    restart: always
    environment:
      DATABASE_URL: postgresql://tagger:tagger_pass@db:5432/image_tagger_v3
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tagger-net
    volumes:
      - image_data:/app/data_store

  frontend:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - tagger-net

volumes:
  postgres_data:
  image_data:

networks:
  tagger-net:
    driver: bridge
